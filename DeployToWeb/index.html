<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Housing Value Predictor (ONNX)</title>
    <!-- ONNX Runtime Web from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
    <script src="index.js"></script>
</head>
<body>
    <h1>Housing Value Predictor</h1>
    <p>Enter the 6 features below to get the estimated median house value (in dollars).</p>

    <div id="prediction-form">
        <input type="number" id="housing_median_age" placeholder="Median Age">
        <input type="number" id="total_rooms"       placeholder="Total Rooms">
        <input type="number" id="total_bedrooms"    placeholder="Total Bedrooms">
        <input type="number" id="population"        placeholder="Population">
        <input type="number" id="households"        placeholder="Households">
        <input type="number" id="median_income"     placeholder="Median Income (tens of thousands)">
        <button onclick="runHousingPrediction()" type="button">Predict Price</button>
    </div>

    <p id="predictionResult"></p>
</body>
</html>
