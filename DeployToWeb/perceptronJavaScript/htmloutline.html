<html>
<head>
    <style>
        .gridcell {
            width: 60px;
            height: 60px;
            font-Size: 1.2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>4x4 T/L classifier </h2>
    <p>Click any cell to toggle it on (1) or off (0).</p>
    <p>After creating an upright, uppercase T or L, click the Predict button. The perceptron will predict if your pattern looks like an uppercase T or L!</p>
    <div id="buttonGrid"></div>
    <button id="predictButton">Predict</button>
    <p id="output"></p>

    <script>
        importedWeights = [2.00000000e-02, -1.00000000e-02, 3.10000000e-01, 6.00000000e-02, -7.00000000e-02, 1.70000000e-01, 2.80000000e-01, -1.60000000e-01, 2.20000000e-01, 9.00000000e-02, 1.90000000e-01, -1.00000000e-02, -4.00000000e-02, -3.46944695e-18, 2.00000000e-01, -5.40000000e-01]
        bias = -0.46000000000000024;

        function activation_function(z) {
            return z >= 0 ? 1 : 0;
        }

        function predict(inputs) {
            let linear_product_p = bias;
            for (let i =0; i < inputs.length; i++){
                linear_product_p += inputs[i] * importedWeights[i];
            }
            y_pred = activation_function(linear_product_p);
            return y_pred
        }        

        function predictLetter(input) {
            const predictedResult = predict(input);
            const predictedLetter = predictedResult === 1 ? "T" : "L";
            document.getElementById("output").innerHTML = `Prediction: ${predictedLetter}`;
        }

        let grid = new Array(16).fill(0);

        function renderGrid() {
            document.getElementById("buttonGrid").innerHTML = "";
            const table = document.createElement("table");

            table.setAttribute("cellpadding", "0");
            table.style.borderCollapse = "collapse";

            for (let row = 0; row < 4; row++) {
                const tableRow = document.createElement("tr");
                for (let column = 0; column < 4; column++) {
                    const index = row * 4 + column;
                    const tableCell = document.createElement("td");
                    const button = document.createElement("button");
                    button.textContent = grid[index]; //to fill button's text with its corresponding 1 or 0 value
                    button.className = "gridcell";

                    button.onclick = (function(i) {
                        return function() {
                            grid[i] = grid[i] === 1 ? 0 : 1;
                            renderGrid();
                        };
                    })(index);
                    tableCell.appendChild(button);
                    tableRow.appendChild(tableCell);
                }
                table.appendChild(tableRow);
            }
            document.getElementById("buttonGrid").appendChild(table);
        }
        
        renderGrid();
        document.getElementById("predictButton").onclick = function(){
            (predictLetter(grid));
        };
    </script>
</body>
</html>
